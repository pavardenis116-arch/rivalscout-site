<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RivalScout — Change History</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,400;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}

[data-theme="dark"]{
  --bg:#0F1117;--bg2:#1C1F2A;--card:#1C1F2A;--line:#2E3240;
  --ink:#F0F0F8;--ink2:#A0A8C0;--ink3:#606880;
  --g:#4ADE80;--g-bg:rgba(74,222,128,.12);
  --r:#F87171;--r-bg:rgba(248,113,113,.12);
  --nav-bg:rgba(15,17,23,.92);
  --shadow:0 2px 24px rgba(0,0,0,.4);
}
[data-theme="light"]{
  --bg:#FAFAF8;--bg2:#F4F3EF;--card:#FFFFFF;--line:#E4E3DC;
  --ink:#141414;--ink2:#505050;--ink3:#909090;
  --g:#16653F;--g-bg:#EAF4EE;
  --r:#B83232;--r-bg:#FAEAEA;
  --nav-bg:rgba(250,250,248,.92);
  --shadow:0 2px 24px rgba(0,0,0,.06);
}
body{background:var(--bg);color:var(--ink)}

/* NAV */
.nav{position:sticky;top:0;z-index:100;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:var(--nav-bg);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);transition:background .3s}
.logo{font-family:'Instrument Serif',serif;font-size:20px;color:var(--ink);text-decoration:none;letter-spacing:-.02em}
.logo em{font-style:italic;color:var(--g)}
.nav-right{display:flex;align-items:center;gap:16px}
.back-btn{font-size:13px;color:var(--ink2);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s}
.back-btn:hover{color:var(--ink)}
.back-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* THEME TOGGLE */
.theme-toggle{position:relative;width:48px;height:26px;cursor:pointer;flex-shrink:0}
.theme-toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{display:block;width:48px;height:26px;background:var(--line);border-radius:999px;transition:background .3s;position:relative}
.toggle-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--ink);transition:transform .3s;display:flex;align-items:center;justify-content:center}
[data-theme="light"] .toggle-knob{transform:translateX(22px)}
.toggle-icon-dark,.toggle-icon-light{position:absolute;top:7px;display:flex;align-items:center;justify-content:center;color:var(--ink2)}
.toggle-icon-dark{left:5px}.toggle-icon-light{right:5px}

/* PAGE HEADER */
.page-header{max-width:720px;margin:0 auto;padding:48px 24px 0}
.page-eyebrow{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--g);margin-bottom:12px}
.page-title{font-family:'Instrument Serif',serif;font-size:clamp(28px,5vw,42px);line-height:1.1;letter-spacing:-.02em;color:var(--ink);margin-bottom:10px}
.page-title em{font-style:italic;color:var(--g)}
.page-sub{font-size:15px;color:var(--ink2);line-height:1.6;margin-bottom:32px}

/* FILTER PILLS */
.filter-wrap{max-width:720px;margin:0 auto;padding:0 24px 32px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{font-size:12px;font-weight:500;padding:7px 16px;border-radius:999px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink2);transition:all .15s;white-space:nowrap}
.filter-btn:hover{border-color:var(--g);color:var(--g)}
.filter-btn.active{background:var(--g);color:#fff;border-color:var(--g)}
[data-theme="dark"] .filter-btn.active{background:#4ADE80;color:#0F1117}

/* TIMELINE */
.timeline-wrap{max-width:720px;margin:0 auto;padding:0 24px 64px}
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:0;top:8px;bottom:0;width:1px;background:var(--line)}

/* DATE GROUP */
.date-group{margin-bottom:32px}
.date-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.date-label::after{content:'';flex:1;height:1px;background:var(--line)}

/* ENTRY */
.entry{position:relative;margin-bottom:16px}
.entry::before{content:'';position:absolute;left:-24px;top:18px;width:8px;height:8px;border-radius:50%;background:var(--g);border:2px solid var(--bg);transition:background .3s}
.entry-card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:background .3s,border-color .3s;box-shadow:var(--shadow)}

.entry-top{padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line)}
.entry-avatar{width:32px;height:32px;border-radius:8px;background:var(--g-bg);color:var(--g);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.entry-meta{flex:1;min-width:0}
.entry-name{font-size:14px;font-weight:500;color:var(--ink);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.entry-tag{font-size:10px;color:var(--ink3);background:var(--bg2);border:1px solid var(--line);padding:2px 8px;border-radius:4px;font-family:'SF Mono','Courier New',monospace;font-weight:400;white-space:nowrap}
.entry-time{font-size:12px;color:var(--ink3)}

.entry-body{padding:14px 20px}
.change-row{display:flex;align-items:baseline;gap:8px;padding:6px 10px;border-radius:7px;margin-bottom:4px;font-size:13px;line-height:1.45}
.change-row:last-child{margin-bottom:0}
.change-sign{font-family:'SF Mono','Courier New',monospace;font-weight:700;font-size:13px;flex-shrink:0;min-width:14px}
.change-text{font-size:13px;line-height:1.45}
.change-rm{background:var(--r-bg)}.change-rm .change-sign,.change-rm .change-text{color:var(--r)}
.change-ad{background:var(--g-bg)}.change-ad .change-sign,.change-ad .change-text{color:var(--g)}

.entry-insight{margin:12px 0 0;padding:11px 14px;background:var(--g-bg);border-left:3px solid var(--g);border-radius:0 8px 8px 0;font-size:13px;color:var(--ink2);line-height:1.6;font-style:italic}

.entry-footer{padding:12px 20px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.entry-link{font-size:12px;color:var(--g);text-decoration:none;font-weight:500;display:flex;align-items:center;gap:4px}
.entry-link:hover{text-decoration:underline}
.entry-link svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* EMPTY & LOADING */
.state-box{text-align:center;padding:64px 20px}
.state-box h3{font-family:'Instrument Serif',serif;font-size:24px;color:var(--ink);margin-bottom:8px}
.state-box p{font-size:15px;color:var(--ink2);line-height:1.65;max-width:36ch;margin:0 auto}
.state-icon{font-size:32px;margin-bottom:16px}
.loading-dots{display:flex;gap:6px;justify-content:center;margin-top:24px}
.loading-dots span{width:6px;height:6px;border-radius:50%;background:var(--g);animation:dot 1.2s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* PREVIEW BANNER */
.preview-banner{background:var(--g-bg);border:1px solid var(--g);border-radius:10px;padding:12px 16px;margin-bottom:24px;font-size:13px;color:var(--g);display:flex;align-items:center;gap:8px}

/* RESPONSIVE */
@media(max-width:600px){
  .nav{padding:0 16px;height:52px}
  .logo{font-size:18px}
  .back-btn span{display:none}
  .page-header{padding:32px 16px 0}
  .filter-wrap{padding:0 16px 24px}
  .timeline-wrap{padding:0 16px 48px}
  .entry-top{padding:14px 16px}
  .entry-body{padding:12px 16px}
  .entry-footer{padding:10px 16px}
  .change-row{font-size:12px;padding:5px 9px}
  .change-text{font-size:12px}
  .entry-insight{font-size:12px}
}
@media(max-width:380px){
  .page-title{font-size:26px}
  .filter-btn{font-size:11px;padding:6px 12px}
}
</style>
</head>
<body>

<nav class="nav">
  <a class="logo" href="/">Rival<em>Scout</em></a>
  <div class="nav-right">
    <a class="back-btn" href="/">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      <span>Back to site</span>
    </a>
    <label class="theme-toggle" title="Toggle theme" aria-label="Toggle dark/light mode">
      <input type="checkbox" id="themeToggle">
      <span class="toggle-track">
        <span class="toggle-knob"></span>
        <span class="toggle-icon-dark" aria-hidden="true">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </span>
        <span class="toggle-icon-light" aria-hidden="true">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </span>
      </span>
    </label>
  </div>
</nav>

<div class="page-header">
  <p class="page-eyebrow">Your monitoring record</p>
  <h1 class="page-title">Every move<br>your rivals <em>made.</em></h1>
  <p class="page-sub">A complete record of every competitor change we've caught — useful to review before a sales call, pricing decision, or product meeting.</p>
</div>

<div class="filter-wrap">
  <div class="filter-row" id="filters">
    <button class="filter-btn active" onclick="filterBy('all', this)">All changes</button>
  </div>
</div>

<div class="timeline-wrap">
  <div class="timeline" id="timeline">
    <div class="state-box">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>
</div>

<script>
var allEntries = [];

async function loadHistory() {
  const params = new URLSearchParams(window.location.search);
  const emailKey = params.get('customer') || localStorage.getItem('rs-customer-key');

  if (!emailKey) {
    showSampleData(true);
    return;
  }

  try {
    const resp = await fetch('https://raw.githubusercontent.com/pavardenis116-arch/pricewatch/main/history/' + emailKey + '.json');
    if (!resp.ok) throw new Error('not found');
    const entries = await resp.json();
    allEntries = [...entries].reverse();
    buildFilters();
    renderEntries(allEntries);
  } catch(e) {
    showSampleData(false);
  }
}

function buildFilters() {
  const competitors = [...new Set(allEntries.map(e => e.competitor))];
  const row = document.getElementById('filters');
  competitors.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = c;
    btn.onclick = function(){ filterBy(c, this); };
    row.appendChild(btn);
  });
}

function filterBy(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = type === 'all' ? allEntries : allEntries.filter(e => e.competitor === type);
  renderEntries(filtered);
}

function renderEntries(entries) {
  const tl = document.getElementById('timeline');
  if (!entries.length) {
    tl.innerHTML = '<div class="state-box"><div class="state-icon">📭</div><h3>No changes yet</h3><p>Check back after your first week of monitoring.</p></div>';
    return;
  }

  // Group by date
  const groups = {};
  entries.forEach(e => {
    const d = e.date || 'Unknown date';
    if (!groups[d]) groups[d] = [];
    groups[d].push(e);
  });

  const pageLabels = {pricing:'pricing',features:'features',messaging:'homepage',jobs:'careers',reviews:'reviews'};

  tl.innerHTML = Object.entries(groups).map(([date, items]) => `
    <div class="date-group">
      <div class="date-label">${formatDate(date)}</div>
      ${items.map(entry => {
        const lines = (entry.summary || '').split('\n').filter(l => l.trim());
        const changes = lines.filter(l => !l.toLowerCase().includes('what this means'));
        const insight = lines.find(l => l.toLowerCase().includes('what this means'));
        const insightText = insight ? insight.replace(/what this means for you:?/gi,'').trim().replace(/^:/,'').trim() : '';
        const label = pageLabels[entry.page_type] || entry.page_type || '';

        const changeHTML = changes.map(l => {
          const clean = l.replace(/^[-•·+\s]+/,'').trim();
          if (!clean) return '';
          const isAdd = l.trim().startsWith('+') || /added|new |increased/i.test(l);
          return `<div class="change-row ${isAdd ? 'change-ad' : 'change-rm'}">
            <span class="change-sign">${isAdd ? '+' : '−'}</span>
            <span class="change-text">${clean}</span>
          </div>`;
        }).filter(Boolean).join('');

        return `
        <div class="entry">
          <div class="entry-card">
            <div class="entry-top">
              <div class="entry-avatar">${(entry.competitor||'?')[0].toUpperCase()}</div>
              <div class="entry-meta">
                <div class="entry-name">
                  ${entry.competitor || 'Unknown'}
                  ${label ? `<span class="entry-tag">${label}</span>` : ''}
                </div>
              </div>
            </div>
            ${changeHTML || insightText ? `<div class="entry-body">
              ${changeHTML}
              ${insightText ? `<div class="entry-insight">${insightText}</div>` : ''}
            </div>` : ''}
            ${entry.url ? `<div class="entry-footer">
              <a class="entry-link" href="${entry.url}" target="_blank" rel="noopener">
                View live page
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </a>
            </div>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>`
  ).join('');
}

function formatDate(str) {
  try {
    return new Date(str).toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'});
  } catch(e) { return str; }
}

function showSampleData(isPreview) {
  allEntries = [
    {date:new Date().toISOString().split('T')[0],competitor:'RivalApp',page_type:'pricing',
     summary:'- Pro plan: $29/mo → $39/mo (+34%)\n- New Teams tier: $99/mo (new)\n- Free trial: 14 days → 7 days\nWhat this means for you: They just priced out their budget customers. Those people are looking for alternatives right now.',
     url:'https://example.com/pricing'},
    {date:new Date(Date.now()-5*864e5).toISOString().split('T')[0],competitor:'CompetitorB',page_type:'features',
     summary:'- Added Slack integration (new)\n- Removed legacy CSV export\nWhat this means for you: Moving toward team workflows. Lead with simplicity if your audience is solo founders.',
     url:'https://example.com/features'},
    {date:new Date(Date.now()-12*864e5).toISOString().split('T')[0],competitor:'RivalApp',page_type:'messaging',
     summary:'- Hero headline changed from "Project management" to "Built for startups"\nWhat this means for you: They\'re repositioning toward your market. Worth watching closely.',
     url:'https://example.com'}
  ];
  buildFilters();
  renderEntries(allEntries);

  if (isPreview) {
    const tl = document.getElementById('timeline');
    const banner = document.createElement('div');
    banner.className = 'preview-banner';
    banner.innerHTML = '👋 <strong>Preview</strong> — this is what your history page will look like once monitoring is active.';
    tl.insertBefore(banner, tl.firstChild);
  }
}

// Theme
const saved = localStorage.getItem('rs-theme') || 'light';
document.documentElement.setAttribute('data-theme', saved);
const toggle = document.getElementById('themeToggle');
toggle.checked = saved === 'light';
toggle.addEventListener('change', function() {
  const t = this.checked ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('rs-theme', t);
});

loadHistory();
</script>
</body>
</html>
